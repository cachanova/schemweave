<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SchemWeave visual review</title>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <strong>ELK <span>vs</span> SchemWeave</strong>
        <small>logic-layout review</small>
      </div>
      <button id="previous" type="button" aria-label="Previous schematic">←</button>
      <select id="fixture" aria-label="Schematic fixture"></select>
      <button id="next" type="button" aria-label="Next schematic">→</button>
      <button id="fit" type="button">Fit both</button>
      <label class="check"><input id="sync" type="checkbox" checked /> Sync view</label>
      <div class="spacer"></div>
      <label class="file-loader">
        Load data
        <input id="data-files" type="file" accept="application/json,.json" multiple />
      </label>
    </header>

    <main>
      <section class="controls" aria-label="SchemWeave layout controls">
        <label>
          Preset
          <select id="preset">
            <option value="compact">Compact</option>
            <option value="balanced" selected>Balanced</option>
            <option value="roomy">Roomy</option>
            <option value="debug">Debug</option>
            <option value="custom">Custom</option>
          </select>
        </label>
        <label>
          Stage spacing <output id="layer-gap-value">66</output>
          <input id="layer-gap" type="range" min="48" max="120" step="6" value="66" />
        </label>
        <label>
          Gate spacing <output id="node-gap-value">30</output>
          <input id="node-gap" type="range" min="20" max="80" step="5" value="30" />
        </label>
        <label>
          Route lanes <output id="lane-gap-value">4</output>
          <input id="lane-gap" type="range" min="2" max="8" step="1" value="4" />
        </label>
        <label>
          Ordering effort <output id="sweeps-value">4</output>
          <input id="sweeps" type="range" min="2" max="8" step="2" value="4" />
        </label>
        <label>
          Routing effort <output id="quality-effort-value">Quality</output>
          <input
            id="quality-effort"
            type="range"
            min="0"
            max="2"
            step="1"
            value="1"
            aria-label="Routing effort"
          />
        </label>
        <div class="status-block">
          <span id="status">Loading review data…</span>
          <small id="corpus-revision"></small>
        </div>
      </section>

      <section id="metrics" class="metrics" aria-label="Quality comparison"></section>

      <section class="canvases">
        <article class="panel elk-panel">
          <div class="panel-title">
            <strong>ELK</strong>
            <span id="elk-size"></span>
          </div>
          <canvas id="elk-canvas"></canvas>
        </article>
        <article class="panel schemweave-panel">
          <div class="panel-title">
            <strong>SchemWeave</strong>
            <span id="schemweave-size"></span>
          </div>
          <canvas id="schemweave-canvas"></canvas>
        </article>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
